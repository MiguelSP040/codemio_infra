version: '3.8'

services:
  codemio-mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: codemio-mysql
    restart: always
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_config:/etc/mysql/conf.d
    networks:
      - codemio-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  codemio-mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: codemio-mysql-exporter
    restart: always
    ports:
      - "${MYSQL_EXPORTER_PORT:-9104}:9104"
    environment:
      DATA_SOURCE_NAME: "${MYSQL_USER}:${MYSQL_PASSWORD}@(codemio-mysql:3306)/${MYSQL_DATABASE}"
    depends_on:
      codemio-mysql:
        condition: service_healthy
    networks:
      - codemio-network
    command:
      - '--collect.info_schema.tablestats'
      - '--collect.info_schema.userstats'
      - '--collect.info_schema.query_response_time'
      - '--collect.auto_increment.columns'
      - '--collect.perf_schema.tableiowaits'
      - '--collect.perf_schema.tablelocks'

  codemio-prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: codemio-prometheus
    restart: always
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - codemio-network
    depends_on:
      - codemio-mysql-exporter
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

  codemio-grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: codemio-grafana
    restart: always
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
    networks:
      - codemio-network
    depends_on:
      - codemio-prometheus

networks:
  codemio-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  mysql_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
